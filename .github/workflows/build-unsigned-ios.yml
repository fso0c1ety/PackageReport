name: Build Unsigned iOS IPA

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*' 

      - name: Install dependencies
        run: npm install

      - name: Ensure Capacitor iOS package
        run: npm install --no-save @capacitor/ios@^8.1.0

      - name: Build Web Assets
        run: npm run build

      - name: Prepare Capacitor iOS
        run: |
          if [ -d ios/App ]; then
            npx cap sync ios
          else
            npx cap add ios
          fi

      - name: Build Unsigned iOS App
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build CONFIGURATION_BUILD_DIR=$PWD/build

      - name: Package into unsigned .ipa
        working-directory: ios/App
        run: |
          mkdir -p Payload
          # Move the compiled .app into the Payload folder
          mv build/App.app Payload/
          # Zip it up and rename the extension to .ipa
          zip -qr App-Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: ios/App/App-Unsigned.ipa
